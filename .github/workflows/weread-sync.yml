name: WeRead Book Sync

on:
  schedule:
    # 每天北京时间 7:00 运行（UTC 23:00）
    - cron: '0 23 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Sync WeRead bookshelf
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
        run: python scripts/weread_sync.py
